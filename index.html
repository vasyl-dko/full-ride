    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Full Ride",
      "url": "https://fullride.info/",

      "author": {
        "@type": "Person",
        "name": "Vasyl Davydko"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://fullride.info/?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
